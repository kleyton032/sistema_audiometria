[pytest]
# Configuração do pytest para o projeto sistema_audiometria

# Diretório de testes
testpaths = tests

# Python files
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers customizados
markers =
    integration: testes de integração com endpoints da API
    unit: testes unitários de funções e classes
    slow: testes que demoram mais tempo
    auth: testes relacionados a autenticação

# Opções de linha de comando padrão
addopts = 
    # Modo verbose padrão
    -v
    # Mostrar 10 linhas de contexto em falhas
    --tb=short
    # Mostrar todas as warnings importantes
    -W default::DeprecationWarning

# Suprime warnings específicos do pytest-asyncio
filterwarnings =
    ignore::pytest.PytestDeprecationWarning
    ignore::pytest_asyncio.plugin.PytestDeprecationWarning
    ignore::DeprecationWarning:pytest_asyncio.*
    ignore::DeprecationWarning:asyncio.*

# Configuração do asyncio
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function


# Minimizar o output de warnings
log_level = WARNING
